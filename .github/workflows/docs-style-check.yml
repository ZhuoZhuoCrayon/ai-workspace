name: docs-style-check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.mdc"
      - "scripts/check_doc_style.py"
      - "config/lint/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/docs-style-check.yml"
  push:
    paths:
      - "**/*.md"
      - "**/*.mdc"
      - "scripts/check_doc_style.py"
      - "config/lint/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/docs-style-check.yml"
  workflow_dispatch:

jobs:
  docs-style-check:
    runs-on: ubuntu-latest
    env:
      python-version: "3.11"
      node-version: "20.18.3"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python-version }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node-version }}

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Pre-commit run (changed files only)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            FROM_SHA="${{ github.event.pull_request.base.sha }}"
          else
            FROM_SHA="${{ github.event.before }}"
          fi
          TO_SHA="${{ github.sha }}"

          if [[ -z "${FROM_SHA}" || "${FROM_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              FROM_SHA="$(git rev-parse HEAD^)"
            else
              echo "No base commit detected (first commit). Running pre-commit on all files."
              pre-commit run --show-diff-on-failure --color=always --verbose --all-files
              exit 0
            fi
          fi

          CHANGED_FILES="$(git diff --name-only --diff-filter=ACMR "${FROM_SHA}" "${TO_SHA}")"
          if [[ -z "${CHANGED_FILES}" ]]; then
            echo "No changed files between ${FROM_SHA} and ${TO_SHA}; skipping pre-commit."
            exit 0
          fi

          echo "Running pre-commit for range ${FROM_SHA}..${TO_SHA}"
          echo "Files to scan (one per line):"
          echo "${CHANGED_FILES}" | sed 's/^/  - /'

          pre-commit run --show-diff-on-failure --color=always --verbose \
            --from-ref "${FROM_SHA}" --to-ref "${TO_SHA}"
