name: docs-style-check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.mdc"
      - "scripts/check_doc_style.py"
      - ".pre-commit-config.yaml"
      - ".github/workflows/docs-style-check.yml"
  push:
    paths:
      - "**/*.md"
      - "**/*.mdc"
      - "scripts/check_doc_style.py"
      - ".pre-commit-config.yaml"
      - ".github/workflows/docs-style-check.yml"
  workflow_dispatch:

jobs:
  docs-style-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run document style check
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import os
          import subprocess
          import sys
          from pathlib import Path

          EXCLUDED_PARTS: set[str] = {".git", "node_modules", "__pycache__", ".venv", "venv"}
          EXCLUDED_PREFIXES: tuple[str, ...] = (".agents/skills/", ".claude/skills/", ".cursor/skills/")

          def get_commit_range() -> tuple[str | None, str]:
              event_name: str = os.environ["EVENT_NAME"]
              if event_name == "pull_request":
                  return os.environ["PR_BASE_SHA"], os.environ["PR_HEAD_SHA"]
              if event_name == "push":
                  before_sha: str = os.environ.get("PUSH_BEFORE_SHA", "")
                  if before_sha and set(before_sha) != {"0"}:
                      return before_sha, os.environ["PUSH_HEAD_SHA"]
                  return None, os.environ["PUSH_HEAD_SHA"]
              return None, os.environ["PUSH_HEAD_SHA"]

          def is_doc_file(path_text: str) -> bool:
              path: Path = Path(path_text)
              if path.suffix not in {".md", ".mdc"}:
                  return False
              if any(part in EXCLUDED_PARTS for part in path.parts):
                  return False
              return not any(path.as_posix().startswith(prefix) for prefix in EXCLUDED_PREFIXES)

          base_sha, head_sha = get_commit_range()
          if base_sha:
              diff_cmd: list[str] = ["git", "diff", "--name-only", base_sha, head_sha]
          else:
              diff_cmd = ["git", "ls-files"]

          changed_files: list[str] = subprocess.check_output(diff_cmd, text=True).splitlines()
          targets: list[str] = [item for item in changed_files if item and is_doc_file(item)]

          if not targets:
              print("No Markdown or MDC changes to check.")
              raise SystemExit(0)

          cmd: list[str] = [sys.executable, "scripts/check_doc_style.py", *targets]
          print("Running:", " ".join(cmd))
          raise SystemExit(subprocess.call(cmd))
          PY
